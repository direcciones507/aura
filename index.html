<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AURA v0.2</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>AURA</h1>
      <p class="subtitle">Asistente de voz personal</p>
    </header>

    <nav class="tabs">
      <button class="tab active" data-screen="home">Inicio</button>
      <button class="tab" data-screen="tasks">Tareas</button>
      <button class="tab" data-screen="history">Historial</button>
      <button class="tab" data-screen="settings">Configuración</button>
    </nav>

    <!-- INICIO -->
    <section id="home" class="screen active">
      <div class="card">
        <h2>Captura rápida</h2>
        <p id="status">Estado: listo</p>

        <textarea id="mentalDump" placeholder="Escribe o dicta tu tarea o descarga mental..."></textarea>

        <div class="actions">
          <button id="micBtn" class="primary">🎤 Hablar</button>
          <button id="saveBtn">💾 Guardar tarea</button>
          <button id="processBtn">🧠 Procesar texto</button>
        </div>

        <div id="processedOutput" class="output hidden"></div>
      </div>
    </section>

    <!-- TAREAS -->
    <section id="tasks" class="screen">
      <div class="card">
        <h2>Tareas activas</h2>
        <div id="tasksList" class="list"></div>
      </div>
    </section>

    <!-- HISTORIAL -->
    <section id="history" class="screen">
      <div class="card">
        <h2>Historial</h2>
        <div id="historyList" class="list"></div>
      </div>
    </section>

    <!-- CONFIG -->
    <section id="settings" class="screen">
      <div class="card">
        <h2>Configuración</h2>

        <label class="setting-row">
          <span>Respuesta por voz</span>
          <input type="checkbox" id="voiceReplyToggle" checked />
        </label>

        <label class="setting-row">
          <span>Idioma de reconocimiento</span>
          <select id="langSelect">
            <option value="es-ES">Español</option>
            <option value="es-US">Español (US)</option>
            <option value="en-US">English</option>
          </select>
        </label>

        <div class="actions">
          <button id="clearHistoryBtn" class="danger">🗑️ Borrar historial</button>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
